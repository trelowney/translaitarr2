{% extends "base.html" %}
{% block title %}Sign in · translAItarr2{% endblock %}
{% block content %}
<div class="center-wrap">
  <div class="brand">transl<span class="accent">AI</span>tarr2</div>
  <form method="post" action="{{ url_for('login') }}">
    <div class="card">
      <label>Password</label>
      <input type="password" name="password" autofocus autocomplete="current-password">
      <div class="toolbar" style="margin-top:16px"><span class="spacer"></span><button class="primary" type="submit">Sign in</button></div>
    </div>
  </form>
</div>
{% endblock %}
