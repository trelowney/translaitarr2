<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}translAItarr2{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  {% if show_nav|default(true) %}
  <header class="topbar">
    <div class="brand">transl<span class="accent">AI</span>tarr2</div>
    <nav class="tabs">
      <a href="{{ url_for('library') }}" class="{{ 'active' if active=='library' }}">Library</a>
      <a href="{{ url_for('queue') }}" class="{{ 'active' if active=='queue' }}">Queue</a>
      <a href="{{ url_for('settings') }}" class="{{ 'active' if active=='settings' }}">Settings</a>
    </nav>
  </header>
  {% endif %}

  <main class="content">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">translAItarr2 · GPL-3.0</footer>
</body>
</html>
