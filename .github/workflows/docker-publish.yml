name: Build & publish Docker image

# Builds a multi-arch image and pushes it to GitHub Container Registry (ghcr.io).
# Triggers (same model as Lingarr):
#   - push to main        -> refreshes the :latest (edge) tag between releases
#   - a published Release  -> publishes :X.Y.Z, :X.Y, :X and :latest from the tag
#   - manual run            -> workflow_dispatch button in the Actions tab
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}   # e.g. yourname/translaitarr2
  # Opt the JS-based actions into Node 24 now (they default to Node 20, which
  # GitHub is retiring). Silences the deprecation warning until the actions ship
  # native Node 24 releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
